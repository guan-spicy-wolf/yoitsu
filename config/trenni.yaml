pasloe_url: "http://localhost:8000"
pasloe_api_key_env: "PASLOE_API_KEY"
source_id: "trenni-supervisor"

palimpsest_command: "/home/holo/yoitsu/palimpsest/.venv/bin/palimpsest"
evo_repo_path: "/home/holo/yoitsu/palimpsest/evo"
work_dir: "/home/holo/yoitsu/trenni-work"

max_workers: 4
poll_interval: 2.0

default_llm:
  model: "kimi-k2.5"
  api_base: "https://coding.dashscope.aliyuncs.com/v1"
  api_key_env: "OPENAI_API_KEY"
  max_iterations: 30
  max_tokens: 4096
  temperature: 0.2
  max_retries: 3
  retry_initial_delay: 1.0
  retry_max_delay: 60.0
  retry_backoff_factor: 2.0

default_workspace:
  depth: 1

default_publication:
  strategy: "branch"
  branch_prefix: "palimpsest/job"
  max_recovery_attempts: 2
